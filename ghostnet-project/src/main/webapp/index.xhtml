<?xml version='1.0' encoding='UTF-8'?>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:head>
        <title>Ghostnet Shea Sepherd</title>
        
    </h:head>

    <h:body>
    
    
        <div class="main-container">

            <!-- Title and Subtitle -->
            <h1 class="home-title">Shea Sepherd</h1>
            <h2 class="home-subtitle">FÜR UNSERE WELTMEERE</h2>
            <h3 class="home-subtitle">Geisternetze melden und bergen</h3>
            
            
            <h:outputText value="Willkommen!" />
			<h:outputText value="Willkommen" />
			
			   <h2 class="home-subtitle">Übersicht über alle gemeldeten Geisternetze</h2>
		
		
			
			<h:dataTable var="ghostnet" value="#{ghostnetlist.liste}">
			
			
			<h:column>
				<f:facet name="header">Id</f:facet>
				<h:outputText value="#{ghostnet.id}"/>
			</h:column>
			
			<h:column>
				<f:facet name="header">Latitude</f:facet>
				<h:outputText value="#{ghostnet.latitude}"/>
			</h:column>
			
			<h:column>
				<f:facet name="header">Longitude</f:facet>
				<h:outputText value="#{ghostnet.longitude}"/>
			</h:column>
			
			<h:column>
				<f:facet name="header">Gesichtet am</f:facet>
				<h:outputText value="#{ghostnet.reportedAt}"/>
			</h:column>
			
			<h:column>
				<f:facet name="header">Größe</f:facet>
				<h:outputText value="#{ghostnet.size}"/>
			</h:column>
		
			<h:column>
				<f:facet name="header">Status</f:facet>
				<h:outputText value="#{ghostnet.status}"/>
			</h:column>
		
		
			</h:dataTable>
	
	<h:form>
            <p:commandButton value="Geisternetz melden" action="#{controller.goToReport()}" />
	</h:form>
      
      
     
         
           
	<h:form>
            <p:commandButton value="Einloggen/Registrieren" action="#{controller.goToLoginRegister()}" />
	</h:form>
           
           
                   
	<h:form>
            <p:commandButton value="Willkommen" action="#{controller.registerPerson}" />
	</h:form>
           
           
           
           
           	
        
           
           
           
        </div>
    </h:body>

</html>
