<?xml version='1.0' encoding='UTF-8'?>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:head>
        <title>Ghostnet Shea Sepherd</title>
        
    </h:head>

    <h:body>
    
 	    <div class="main-container">

          <h:form> 
	           <p:card style="width:30em; margin:auto;" >
    	       <f:facet name="title">Geisternetz melden</f:facet>
           
           		 <p:panelGrid columns="2" layout="flex" styleClass="p-fluid align-items-baseline">
                 
			        <p:outputLabel for="text1" value="Breitengrad"/>
			        <p:inputText id="text1" required="true"/>
			
			        <p:outputLabel for="text2" value="Längengrad"/>
			        <p:inputText id="text2" required="true"/>
			
			        <p:outputLabel for="date" value="Gesichtet am"/>
			        <p:datePicker id="date" required="true" showIcon="true" style="width:auto"/>
			
			        <p:outputLabel for="text3" value="Größe"/>
			        <p:inputText id="text3" required="true"/>

					<p:outputLabel for="text4" value="Telefonnummer"/>
        			<p:inputText id="text4"/>

   			     </p:panelGrid>
            
            
           	  <f:facet name="footer">
        		<p:commandButton icon="pi pi-check" value="Save"/>
       			<p:commandButton icon="pi pi-times" value="Cancel" styleClass="ui-button-secondary" style="margin-left: .5em"/>
   			  </f:facet>
            
    		  </p:card>  
          </h:form>
            
                
          <h:form>    
          	<p:commandButton value="Startseite" action="#{controller.goToIndex()}" />
          </h:form> 
        
        </div>
    
    </h:body>

</html>
