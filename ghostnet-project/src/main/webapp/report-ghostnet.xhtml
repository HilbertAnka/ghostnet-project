<?xml version='1.0' encoding='UTF-8'?>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:head>
        <title>Ghostnet Shea Sepherd</title>
        
    </h:head>

    <h:body>
    
 	    <div class="main-container">
 	    
 	        <!-- Fehlermeldungen anzeigen !!!"!Das hier nochmal checken!! -->
        <h:form id="form-meldung">
            
            
          	<p:growl id="growl" showDetail="false" life="3000" sticky="false" />
            
	           <p:card style="width:30em; margin:auto;" >
    	       <f:facet name="title">Geisternetz melden</f:facet>
           
           		 <p:panelGrid columns="2" layout="flex" styleClass="p-fluid align-items-baseline">
                 
			        <p:outputLabel for="latitude" value="Breitengrad"/>
			        <p:inputText id="latitude" value="#{ghostnetController.ghostnet.latitude}" required="true"/>
			
			        <p:outputLabel for="longitude" value="Längengrad"/>
			        <p:inputText id="longitude" value="#{ghostnetController.ghostnet.longitude}" required="true"/>
			
			        <p:outputLabel for="date" value="Gesichtet am"/>
			        <p:datePicker id="date" value="#{ghostnetController.ghostnet.reportedAt}" showIcon="true" style="width:auto" required="true"/>
			        
			
			        <p:outputLabel for="size" value="Größe in m² (ca.)"/>
			        <p:inputText id="size" value="#{ghostnetController.ghostnet.size}" required="true"/>

   			     </p:panelGrid>
            
            
           	  <f:facet name="footer">
        		<p:commandButton icon="pi pi-check" value="Sichern" action="#{ghostnetController.addGhostnet}" update="growl @form"/>
       			
   			  </f:facet>
            
    		  </p:card>  
          </h:form>
            
                
          <h:form>    
          	<p:commandButton value="Startseite" action="#{controller.goToIndex}" rendered="#{not loginController.loggedIn}" />
          </h:form> 
        
         <h:form>
            <p:commandButton value="Dashboard" action="#{controller.goToDashboard}" rendered="#{loginController.loggedIn}" />
		   </h:form>
           
        
           <h:form>
            <p:commandButton value="Ausloggen" action="#{loginController.logout}" rendered="#{loginController.loggedIn}" />
		   </h:form>
		   
		    
           
        </div>
    
    </h:body>

</html>
