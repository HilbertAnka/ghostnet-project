<?xml version='1.0' encoding='UTF-8'?>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:head>
        <title>Ghostnet Shea Sepherd</title>
        
    </h:head>

    <h:body>
        <div class="main-container">

            
	          <p:card style="width:30em; margin:auto;" >
	           
	           <p:tabView>
         		 
         		 <f:facet name="title">Login/Register</f:facet>
            	
            	
            		<p:tab title="Login">	
            		
            			<h:form>
	            		<p:panelGrid columns="3" layout="flex" styleClass="p-fluid align-items-baseline">
	                 
					        <p:outputLabel for="email" value="E-Mail"/>
					        <p:inputText id="email" value="#{loginController.email}" required="true">
					        <f:event type="jakarta.faces.event.PostValidateEvent"
								listener="#{loginController.setEmailFromField}" />	
					        </p:inputText>
					        <p:message styleClass="error" for="email"><p:autoUpdate/>
							</p:message>
					        	
					        
					        <p:outputLabel for="pass" value="Passwort"/>
					        <p:password id="pass" value="#{loginController.password}" 
					        	required="true" validator="#{loginController.validateLogin}"/>
					        	
							<p:message styleClass="error" for="pass"><p:autoUpdate/>
							</p:message>
					        
					        <f:facet name="footer">
		        				<p:commandButton icon="pi pi-check" value="Login" action="#{loginController.login}"/>
		   			  		</f:facet>
	
	    			    </p:panelGrid>
    			    	</h:form>
    		
           		    </p:tab>

 
          		    
          		    <p:tab title="Register"> 
          		    
          		    <h:form>
          		    
          		    <p:growl id="growl" showDetail="false" life="3000" sticky="false" />
          		    
            		<p:panelGrid columns="3" layout="flex" styleClass="p-fluid align-items-baseline">
	                 
		                    <p:outputLabel for="name" value="Vorname"/>
					        <p:inputText id="name" value="#{registerController.user.firstName}" required="true"/>
					        
					        <p:outputLabel for="surname" value="Name"/>
					        <p:inputText id="surname" value="#{registerController.user.name}" required="true"/>
					        
					        <p:outputLabel for="phonenumber" value="Telefonnummer"/>
					        <p:inputText id="phonenumber" value="#{registerController.user.phonenumber}" required="true" />
		                    
		                    <p:outputLabel for="email" value="E-Mail"/>
					        <p:inputText id="email" value="#{registerController.user.email}" required="true"/>
					     
					        <p:outputLabel for="password" value="Passwort"/>
					        <p:inputText id="password" value="#{registerController.user.password}" required="true"/>
					        	
						  <f:facet name="footer">
		        				<p:commandButton icon="pi pi-check" value="Registrieren" action="#{registerController.addUser}" update="@form"  ajax="true"/>
		   			  	  </f:facet>
	
	               	</p:panelGrid>
           		 	</h:form>
   			 
   			       	</p:tab> 
   			      
     
        	 	 </p:tabView>
            
    		  </p:card>  
          
                  
           <h:form>    
           	<p:commandButton value="Startseite" action="#{controller.goToIndex}" />
           </h:form> 
            
            
                
           <h:form>    
           	<p:commandButton value="Dashboard" action="#{controller.goToDashboard}" />
           </h:form> 
           
         
           
        </div>
    </h:body>

</html>
